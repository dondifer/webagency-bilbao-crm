name: Fix — Limpiar y registrar BigTooth

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Limpiar registros incorrectos
        run: |
          echo "Limpiando clientes undefined..."
          CLIENTES=$(curl -s "https://webagency-bilbao-crm.netlify.app/api/clientes")
          echo "Clientes actuales: $CLIENTES" | head -c 500

      - name: Borrar todos los datos incorrectos
        run: |
          curl -s -X POST "https://webagency-bilbao-crm.netlify.app/api/clear-demo" \
            -H "Content-Type: application/json" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print('Limpieza:', d)
          except:
              print('Respuesta limpieza:', sys.stdin.read()[:200])
          "

      - name: Registrar BigTooth correctamente
        run: |
          curl -s -X POST "https://webagency-bilbao-crm.netlify.app/api/onboarding" \
            -H "Content-Type: application/json" \
            --data-raw '{
              "cliente": {
                "nombre": "Clinica BigTooth",
                "sector": "dental",
                "zona": "Deusto, Bilbao",
                "email": "info@bigtooth.es",
                "telefono": "+34 944 123 456",
                "plan": "premium",
                "url_web": "https://clinica-bigtooth.netlify.app",
                "url_crm": "https://clinica-bigtooth-crm.netlify.app",
                "repo_github": "https://github.com/dondifer/clinica-bigtooth",
                "notas": "Ecosistema Premium. Web paleta fria azul-verde. Sedacion, tecnologia 3D, euskera. QA 8.4/10."
              },
              "proyecto": {
                "nombre": "Ecosistema Premium BigTooth",
                "tipo": "Ecosistema Premium",
                "valor": 1800,
                "fecha_entrega": "2025-06-27",
                "notas": "Web HTML paleta fria, CRM dental, schema Supabase 7 tablas."
              }
            }' | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('ok'):
              c = d.get('cliente', {})
              p = d.get('proyecto', {})
              print('REGISTRADO OK:')
              print('  Nombre:', c.get('nombre'))
              print('  Plan:', c.get('plan'))
              print('  ID:', c.get('id'))
              print('  Proyecto:', p.get('nombre'))
              print('  Valor:', p.get('valor'))
          else:
              print('ERROR:', d)
              exit(1)
          "

      - name: Verificar resultado final
        run: |
          RESULT=$(curl -s "https://webagency-bilbao-crm.netlify.app/api/clientes")
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          clientes = d if isinstance(d, list) else d.get('clientes', [])
          print(f'CLIENTES EN CRM: {len(clientes)}')
          for c in clientes:
              print(f'  - {c.get(\"nombre\")} | {c.get(\"plan\")} | {c.get(\"zona\")} | {c.get(\"url_web\")}')
          "
